global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    project: 'mlops-depression-pipeline'
    env: 'development'

scrape_configs:
  - job_name: 'fastapi'
    static_configs:
      - targets: ['fastapi:8000']
    metrics_path: '/metrics'
    scrape_interval: 10s

  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'mariadb'
    static_configs:
      - targets: ['mariadb:3306']
    # Requires mysqld_exporter sidecar in production

alerting:
  alertmanagers:
    - static_configs:
        - targets: []
